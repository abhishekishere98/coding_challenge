[tool.black]
line-length = 100
target-version = ["py310"]

[tool.ruff]
line-length = 100
target-version = "py310"
exclude = [
    ".git",
    ".idea",
    ".pytest_cache",
    "Results",
    "venv",
]

[tool.ruff.lint]
select = ["E9", "F63", "F7", "F82"]
ignore = [
    "E501",
]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["B011"]
