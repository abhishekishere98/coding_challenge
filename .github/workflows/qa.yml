name: QA

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
      - name: Lint
        run: ruff check .

  smoke:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          python -m playwright install --with-deps chromium
      - name: Run smoke tests
        run: pytest -m smoke --headless -n auto --dist loadscope --alluredir Results/allure-results
      - name: Upload browser artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: browser-artifacts
          path: Results/
          if-no-files-found: ignore
      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-allure-results
          path: Results/allure-results/
          if-no-files-found: ignore

  zoopla:
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
      - name: Run Zoopla tests
        env:
          ZOOPLA_USERNAME: ${{ secrets.ZOOPLA_USERNAME }}
          ZOOPLA_PASSWORD: ${{ secrets.ZOOPLA_PASSWORD }}
        run: pytest -m "zoopla" --selectbrowser=chrome --headless -n 2 --dist loadscope --alluredir Results/allure-results
      - name: Upload browser artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zoopla-artifacts
          path: Results/
          if-no-files-found: ignore
      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zoopla-allure-results
          path: Results/allure-results/
          if-no-files-found: ignore
