[pytest]
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*
addopts =
    -ra
    --strict-markers
    --strict-config
    --tb=short
testpaths =
    tests

markers =
    code_challenge: Zoopla challenge flows that require live site access
    default: stable Sauce Labs regression tests
    smoke: smallest confidence suite for pull requests
    e2e: browser-driven end-to-end tests
    selenium: Selenium WebDriver tests
    playwright: Playwright tests
    zoopla: tests against Zoopla
    sauce_labs: tests against Sauce Demo
    new_pw: legacy marker for newer Playwright Sauce Demo tests
